name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pywin32 Pillow pygame numpy requests pyinstaller
    
    - name: Extract version
      id: version
      shell: pwsh
      run: |
        $content = Get-Content gui.py -Raw
        if ($content -match 'VERSION = "(\d+)"') {
          $version = $matches[1]
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Found version: $version"
        } else {
          echo "Failed to extract version"
          exit 1
        }
    
    - name: Build EXE
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        pyinstaller --onefile --windowed --name "K-$version" --clean --noconfirm gui.py
        if (Test-Path "dist/K-$version.exe") {
          echo "Build successful: dist/K-$version.exe"
        } else {
          echo "Build failed - exe not found"
          exit 1
        }
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: K监控工具 v${{ steps.version.outputs.VERSION }}
        files: dist/K-${{ steps.version.outputs.VERSION }}.exe
        body: |
          自动构建版本 v${{ steps.version.outputs.VERSION }}
          
          下载 K-${{ steps.version.outputs.VERSION }}.exe 运行即可
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
