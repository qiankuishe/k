name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Extract version
      id: version
      run: |
        $version = (Select-String -Path gui.py -Pattern 'VERSION = "(\d+)"').Matches.Groups[1].Value
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
      shell: pwsh
    
    - name: Build EXE
      run: python build.py
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: K监控工具 v${{ steps.version.outputs.VERSION }}
        files: dist/K-${{ steps.version.outputs.VERSION }}.exe
        body: |
          自动构建版本 v${{ steps.version.outputs.VERSION }}
          
          下载 K-${{ steps.version.outputs.VERSION }}.exe 运行即可
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
